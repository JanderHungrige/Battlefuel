# Serve the built BattleFuel SPA and proxy the API + WebSocket to the backend, so a single
# published HTTP port is the whole app (http://host:PORT). An external TLS terminator
# (Caddy, or Nginx Proxy Manager) can sit in front by hostname — the SPA calls the API
# same-origin, so it works on any domain/scheme without a rebuild.

# Map the Upgrade header to the right Connection value for WebSocket proxying.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve the backend at request time via Docker's embedded DNS, so nginx starts even
    # if the backend isn't up yet (avoids "host not found in upstream" on boot).
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream "backend:8000";

    # API + live sim WebSocket -> FastAPI backend (Upgrade headers enable WS).
    location /api/v1/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep long-lived sim sockets open
    }

    # Hashed Vite assets are content-addressed — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The offline basemap is a large, immutable binary; allow range requests (default on)
    # and cache it. Served at /hohenfels.pmtiles by the pmtiles client.
    location = /hohenfels.pmtiles {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: everything else resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
