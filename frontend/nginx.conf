# Serve the built BattleFuel SPA. The edge reverse proxy (Caddy) terminates TLS and routes
# /api/v1 to the backend; this server only serves static files + SPA fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets are content-addressed — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The offline basemap is a large, immutable binary; allow range requests (default on)
    # and cache it. Served at /hohenfels.pmtiles by the pmtiles client.
    location = /hohenfels.pmtiles {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: everything else resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
