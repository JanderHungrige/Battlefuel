name: build-and-push

# Build the BattleFuel images and push them to GHCR on every merge/commit to the deploy
# branches. The host (159.195.148.193) runs Watchtower, which auto-pulls the new images and
# restarts the affected services — so this workflow never SSHes into the host.
#
#   main            -> images tagged :main  -> prod stack on :3000
#   dev-deployment  -> images tagged :dev   -> dev  stack on :3001
#
# TLS + domains are handled externally by Nginx Proxy Manager (NPM):
#   battlefuel.jeanquestenterprise.de      -> 159.195.148.193:3000
#   battlefuel-dev.jeanquestenterprise.de  -> 159.195.148.193:3001
# The SPA calls the API same-origin, so one frontend build works for both.

on:
  push:
    branches: [main, dev-deployment]
    # Only rebuild images when something that affects them changes — not deploy config/docs.
    paths-ignore:
      - '.mdd/**'
      - 'deploy/**'
      - 'infra/**'
      - '**.md'
      - 'TODO.md'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: janderhungrige

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select image tag for this branch
        id: cfg
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=main" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build with the runner's built-in BuildKit (no docker-container builder to boot, so no
      # extra moby/buildkit pull from Docker Hub — that builder boot was the flaky step).
      - name: Build & push images
        env:
          DOCKER_BUILDKIT: "1"
          IMG: ${{ env.REGISTRY }}/${{ env.OWNER }}
          TAG: ${{ steps.cfg.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$IMG/battlefuel-backend:$TAG" -t "$IMG/battlefuel-backend:$SHA" ./backend
          docker build -t "$IMG/battlefuel-db:$TAG" ./db
          # Relative API base -> the SPA calls /api/v1 same-origin (nginx proxies it to the
          # backend) and derives the WS scheme from the page. One image works for any domain.
          docker build -f frontend/Dockerfile --build-arg VITE_API_BASE=/api/v1 \
            -t "$IMG/battlefuel-frontend:$TAG" -t "$IMG/battlefuel-frontend:$SHA" .
          docker push "$IMG/battlefuel-backend:$TAG"
          docker push "$IMG/battlefuel-backend:$SHA"
          docker push "$IMG/battlefuel-db:$TAG"
          docker push "$IMG/battlefuel-frontend:$TAG"
          docker push "$IMG/battlefuel-frontend:$SHA"

      - name: Summary
        run: |
          echo "Pushed :${{ steps.cfg.outputs.tag }} images to ${{ env.REGISTRY }}/${{ env.OWNER }}." >> "$GITHUB_STEP_SUMMARY"
          echo "Watchtower on 159.195.148.193 will auto-pull and restart the affected services." >> "$GITHUB_STEP_SUMMARY"
