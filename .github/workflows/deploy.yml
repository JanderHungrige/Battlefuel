name: build-and-push

# Build the BattleFuel images and push them to GHCR on every merge/commit to the deploy
# branches. The host (159.195.148.193) runs Watchtower, which auto-pulls the new images and
# restarts the affected services — so this workflow never SSHes into the host.
#
#   main            -> images tagged :main  -> prod stack on :3000
#   dev-deployment  -> images tagged :dev   -> dev  stack on :3001
#
# TLS + domains are handled externally by Nginx Proxy Manager (NPM):
#   battlefuel.jeanquestenterprise.de      -> 159.195.148.193:3000
#   battlefuel-dev.jeanquestenterprise.de  -> 159.195.148.193:3001
# The SPA calls the API same-origin, so one frontend build works for both.

on:
  push:
    branches: [main, dev-deployment]

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: janderhungrige

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select image tag for this branch
        id: cfg
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=main" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/battlefuel-backend:${{ steps.cfg.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/battlefuel-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push db
        uses: docker/build-push-action@v6
        with:
          context: ./db
          file: ./db/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/battlefuel-db:${{ steps.cfg.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          # Relative API base -> the SPA calls /api/v1 same-origin (nginx proxies it to the
          # backend), and derives the WS scheme from the page. One image works for any domain.
          build-args: |
            VITE_API_BASE=/api/v1
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/battlefuel-frontend:${{ steps.cfg.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/battlefuel-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed :${{ steps.cfg.outputs.tag }} images to ${{ env.REGISTRY }}/${{ env.OWNER }}." >> "$GITHUB_STEP_SUMMARY"
          echo "Watchtower on 159.195.148.193 will auto-pull and restart the affected services." >> "$GITHUB_STEP_SUMMARY"
